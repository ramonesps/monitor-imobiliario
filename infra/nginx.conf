# nginx reverse proxy — monitor.ramonps.com → localhost:3000
#
# Deploy:
#   sudo cp infra/nginx.conf /etc/nginx/sites-available/monitor
#   sudo ln -sf /etc/nginx/sites-available/monitor /etc/nginx/sites-enabled/monitor
#   sudo nginx -t && sudo systemctl reload nginx
#
# Pré-requisito: DNS A record no Cloudflare apontando monitor.ramonps.com → 137.131.148.77
# com proxy habilitado (nuvem laranja). O TLS é terminado pelo Cloudflare; nginx só
# precisa escutar na porta 80 (Cloudflare → Oracle).
# Oracle Cloud Security List: permitir inbound TCP porta 80.

server {
    listen 80;
    server_name monitor.ramonps.com;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
