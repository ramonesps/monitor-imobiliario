version: '3.8'

services:
  monitor:
    build: .
    container_name: monitor-imobiliario
    ports:
      - "3000:3000"
    volumes:
      # Dados persistentes: banco SQLite + fotos baixadas
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/monitor.db
      - NEXT_PUBLIC_BASE_URL=http://localhost:3000
    # Limites para Oracle Cloud Free Tier (4 vCPU / 24 GB RAM)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/buildings"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
